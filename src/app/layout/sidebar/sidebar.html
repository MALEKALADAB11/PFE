<aside class="sidebar" [class.sidebar--mobile-open]="layout.mobileSidebarOpen()">

  <!-- Brand -->
  <div class="sidebar__brand">
    <div class="sb-logo">
      <span class="sb-ooredoo">ooredoo<span class="sb-star">*</span></span>
      <span class="sb-retail-coach">RETAIL COACH</span>
    </div>
    <button class="sb-close-btn" (click)="layout.closeMobileSidebar()" aria-label="Fermer menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Store Selector -->
  <div class="sidebar__store-selector">
    <div class="sb-store-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    </div>
    <div class="sb-store-info">
      <span class="sb-store-name">FR LAC2 Tunisia Mall</span>
      <span class="sb-store-meta">Manager · {{ ws.liveMetrics()?.advisors?.length ?? 4 }} conseillers</span>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
  </div>

  <!-- Navigation -->
  <nav class="sidebar__nav">

    <a routerLink="/dashboard" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </span>
      <span class="snav-label">Dashboard</span>
    </a>

    <a routerLink="/inventory" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      </span>
      <span class="snav-label">Inventory</span>
    </a>

    <a routerLink="/conseiller" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      </span>
      <span class="snav-label">Advisors</span>
    </a>

    <a routerLink="/chat" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </span>
      <span class="snav-label">Coach Agent</span>
      <span class="snav-live-badge">LIVE</span>
    </a>

    <a routerLink="/monitoring" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      </span>
      <span class="snav-label">Monitoring</span>
    </a>

    <a routerLink="/purchase-board" routerLinkActive="snav-active" class="snav-item">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </span>
      <span class="snav-label">Achats</span>
    </a>

    <span class="snav-item snav-item--disabled">
      <span class="snav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      </span>
      <span class="snav-label">Reports</span>
    </span>

  </nav>

  <div class="sidebar__spacer"></div>

  <!-- System Status -->
  <div class="sidebar__status">
    <div class="sb-status-dot"></div>
    <div class="sb-status-info">
      <span class="sb-status-title">Système nominal</span>
      <span class="sb-status-sub">Tous les systèmes opérationnels</span>
    </div>
  </div>

  <!-- User Profile -->
  <div class="sidebar__user">
    <div class="sb-user-avatar">MG</div>
    <div class="sb-user-info">
      <span class="sb-user-name">Meriam Guizani</span>
      <span class="sb-user-role">Manager</span>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
  </div>

</aside>
