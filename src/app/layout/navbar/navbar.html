<header class="rc-topbar">

  <!-- Weather -->
  <div class="rc-topbar-pill">
    <span class="rc-topbar-pill__icon">{{ ws.weatherIcon() || '⛅' }}</span>
    <div class="rc-topbar-pill__text">
      <span class="rc-topbar-pill__main">{{ ws.weatherLabel() || 'Ciel dégagé' }}</span>
      <span class="rc-topbar-pill__sub">{{ ws.weatherTemp() || '25°C' }}</span>
    </div>
  </div>

  <!-- Date / Time -->
  <div class="rc-topbar-pill">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    <div class="rc-topbar-pill__text">
      <span class="rc-topbar-pill__main">{{ currentTime() }}</span>
      <span class="rc-topbar-pill__sub">{{ currentDate() }}</span>
    </div>
  </div>

  <!-- System Status -->
  <div class="rc-topbar-pill">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" [attr.stroke]="isConnected() ? '#27AE60' : '#E74C3C'" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <div class="rc-topbar-pill__text">
      <span class="rc-topbar-pill__main">Statut système</span>
      <span class="rc-topbar-pill__sub rc-topbar-status" [style.color]="isConnected() ? '#27AE60' : '#E74C3C'">
        <span class="rc-topbar-status__dot" [style.background]="isConnected() ? '#27AE60' : '#E74C3C'"></span>
        {{ isConnected() ? 'Nominal' : 'Déconnecté' }}
      </span>
    </div>
  </div>

  <!-- CoachAgent button -->
  <button class="rc-coach-btn" routerLink="/chat">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    CoachAgent
    <span class="rc-coach-live">
      <span class="rc-coach-live__dot"></span>
      LIVE
    </span>
  </button>

</header>
